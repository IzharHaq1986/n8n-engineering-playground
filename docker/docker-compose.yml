services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n-engineering-playground
    ports:
      - "5678:5678"
    restart: unless-stopped

    healthcheck:
      test:
        - CMD-SHELL
        - wget --quiet --spider http://localhost:5678/rest/settings || exit 1
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 60s

    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_DIAGNOSTICS_ENABLED=false
      - N8N_PERSONALIZATION_ENABLED=false
    volumes:
      - n8n_data:/home/node/.n8n

volumes:
  n8n_data:
